name: Sync Upstream

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Skip in the upstream repo itself — this workflow is only meaningful in forks
    if: github.repository != 'reckhou/lorengine'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: YOUR_GITHUB_USERNAME/lorengine
          upstream_sync_branch: main
          target_sync_branch: upstream-sync
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false
